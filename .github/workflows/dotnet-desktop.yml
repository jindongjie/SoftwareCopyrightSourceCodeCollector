name: .NET Core Desktop

permissions:
  contents: write

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      Project_Path: SoftwareCopyrightSourceCodeCollector.Desktop/SoftwareCopyrightSourceCodeCollector.Desktop.csproj
      Console_Project_Path: SoftwareCopyrightSourceCodeCollector.Console/SoftwareCopyrightSourceCodeCollector.Console.csproj
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish Application for Windows
        shell: pwsh
        run: |
          dotnet publish $env:Project_Path `
            -c Release `
            --self-contained true `
            --runtime win-x64 `
            -p:PublishSingleFile=true `
            -p:PublishReadyToRun=true `
            -p:PublishTrimmed=true

      - name: Publish Console Application for Windows
        shell: pwsh
        run: |
          dotnet publish $env:Console_Project_Path `
            -c Release `
            --self-contained true `
            --runtime win-x64

      - name: Archive Windows Build Output
        shell: pwsh
        run: |
          $publishDir = Get-ChildItem -Path "SoftwareCopyrightSourceCodeCollector.Desktop" -Recurse -Directory -Filter "publish" |
                        Where-Object { $_.FullName -match "win-x64" } |
                        Select-Object -First 1 -ExpandProperty FullName
          if (-Not $publishDir) {
            Write-Error "Desktop publish folder not found"
            exit 1
          }
          Write-Host "Found Desktop publish directory: $publishDir"
          Compress-Archive -Path "$publishDir\*" -DestinationPath release-windows.zip

      - name: Archive Windows Console Build Output
        shell: pwsh
        run: |
          $publishDir = Get-ChildItem -Path "SoftwareCopyrightSourceCodeCollector.Console" -Recurse -Directory -Filter "publish" |
                        Where-Object { $_.FullName -match "win-x64" } |
                        Select-Object -First 1 -ExpandProperty FullName
          if (-Not $publishDir) {
            Write-Error "Console publish folder not found"
            exit 1
          }
          Write-Host "Found Console publish directory: $publishDir"
          Compress-Archive -Path "$publishDir\*" -DestinationPath release-windows-console.zip

      - name: Generate Checksum (Windows)
        shell: pwsh
        run: |
          $hash = Get-FileHash -Algorithm SHA256 release-windows.zip
          "$($hash.Hash.ToLower())  release-windows.zip" | Out-File -Encoding utf8 release-windows.zip.sha256
          Get-Content release-windows.zip.sha256
          $hash = Get-FileHash -Algorithm SHA256 release-windows-console.zip
          "$($hash.Hash.ToLower())  release-windows-console.zip" | Out-File -Encoding utf8 release-windows-console.zip.sha256
          Get-Content release-windows-console.zip.sha256

      - name: Upload Build Artifacts (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-${{ github.run_id }}
          path: |
            release-windows.zip
            release-windows.zip.sha256
            release-windows-console.zip
            release-windows-console.zip.sha256

      - name: Upload Release Assets (Windows)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-windows.zip
            release-windows.zip.sha256
            release-windows-console.zip
            release-windows-console.zip.sha256

  build-ubuntu:
    runs-on: ubuntu-latest
    env:
      Project_Path: SoftwareCopyrightSourceCodeCollector.Desktop/SoftwareCopyrightSourceCodeCollector.Desktop.csproj
      Console_Project_Path: SoftwareCopyrightSourceCodeCollector.Console/SoftwareCopyrightSourceCodeCollector.Console.csproj
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish Application for Ubuntu
        run: |
          dotnet publish ${{ env.Project_Path }} \
            -c Release \
            --self-contained true \
            --runtime linux-x64 \
            -p:PublishSingleFile=true \
            -p:PublishReadyToRun=true \
            -p:PublishTrimmed=true

      - name: Publish Console Application for Ubuntu
        run: |
          dotnet publish ${{ env.Console_Project_Path }} \
            -c Release \
            --self-contained true \
            --runtime linux-x64

      - name: Archive Ubuntu Build Output
        run: |
          PUBLISH_DIR=$(find SoftwareCopyrightSourceCodeCollector.Desktop -type d -path "*/bin/Release/net8.0/linux-x64/publish" | head -n 1)
          if [ -z "$PUBLISH_DIR" ]; then
            echo "Desktop publish directory not found!" && exit 1
          fi
          echo "Found Desktop publish directory: $PUBLISH_DIR"
          cd "$PUBLISH_DIR"
          zip -r "$GITHUB_WORKSPACE/release-Linux.zip" .

      - name: Archive Ubuntu Console Build Output
        run: |
          PUBLISH_DIR=$(find SoftwareCopyrightSourceCodeCollector.Console -type d -path "*/bin/Release/net8.0/linux-x64/publish" | head -n 1)
          if [ -z "$PUBLISH_DIR" ]; then
            echo "Console publish directory not found!" && exit 1
          fi
          echo "Found Console publish directory: $PUBLISH_DIR"
          cd "$PUBLISH_DIR"
          zip -r "$GITHUB_WORKSPACE/release-Linux-console.zip" .

      - name: Generate Checksum (Ubuntu)
        run: |
          sha256sum release-Linux.zip > release-Linux.zip.sha256
          cat release-Linux.zip.sha256
          sha256sum release-Linux-console.zip > release-Linux-console.zip.sha256
          cat release-Linux-console.zip.sha256

      - name: Upload Build Artifacts (Ubuntu)
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-build-${{ github.run_id }}
          path: |
            release-Linux.zip
            release-Linux.zip.sha256
            release-Linux-console.zip
            release-Linux-console.zip.sha256

      - name: Upload Release Assets (Ubuntu)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-Linux.zip
            release-Linux.zip.sha256
            release-Linux-console.zip
            release-Linux-console.zip.sha256

  build-macos:
    runs-on: macos-latest
    env:
      Project_Path: SoftwareCopyrightSourceCodeCollector.Desktop/SoftwareCopyrightSourceCodeCollector.Desktop.csproj
      Console_Project_Path: SoftwareCopyrightSourceCodeCollector.Console/SoftwareCopyrightSourceCodeCollector.Console.csproj
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish Application for macOS
        run: |
          dotnet publish ${{ env.Project_Path }} \
            -c Release \
            --self-contained true \
            --runtime osx-x64 \
            -p:PublishSingleFile=true \
            -p:PublishReadyToRun=true \
            -p:PublishTrimmed=true

      - name: Publish Console Application for macOS
        run: |
          dotnet publish ${{ env.Console_Project_Path }} \
            -c Release \
            --self-contained true \
            --runtime osx-x64

      - name: Archive macOS Build Output
        run: |
          PUBLISH_DIR=$(find SoftwareCopyrightSourceCodeCollector.Desktop -type d -path "*/bin/Release/net8.0/osx-x64/publish" | head -n 1)
          if [ -z "$PUBLISH_DIR" ]; then
            echo "Desktop publish directory not found!" && exit 1
          fi
          echo "Found Desktop publish directory: $PUBLISH_DIR"
          cd "$PUBLISH_DIR"
          zip -r "$GITHUB_WORKSPACE/release-macos.zip" .

      - name: Archive macOS Console Build Output
        run: |
          PUBLISH_DIR=$(find SoftwareCopyrightSourceCodeCollector.Console -type d -path "*/bin/Release/net8.0/osx-x64/publish" | head -n 1)
          if [ -z "$PUBLISH_DIR" ]; then
            echo "Console publish directory not found!" && exit 1
          fi
          echo "Found Console publish directory: $PUBLISH_DIR"
          cd "$PUBLISH_DIR"
          zip -r "$GITHUB_WORKSPACE/release-macos-console.zip" .

      - name: Generate Checksum (macOS)
        run: |
          shasum -a 256 release-macos.zip > release-macos.zip.sha256
          cat release-macos.zip.sha256
          shasum -a 256 release-macos-console.zip > release-macos-console.zip.sha256
          cat release-macos-console.zip.sha256

      - name: Upload Build Artifacts (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-${{ github.run_id }}
          path: |
            release-macos.zip
            release-macos.zip.sha256
            release-macos-console.zip
            release-macos-console.zip.sha256

      - name: Upload Release Assets (macOS)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-macos.zip
            release-macos.zip.sha256
            release-macos-console.zip
            release-macos-console.zip.sha256
